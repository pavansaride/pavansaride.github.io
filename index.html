<!DOCTYPE html>
<html>
<head>
  <title>Rama Koti 1 Crore</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background-color: #fff8e1;
    }

    .rama-text {
      color: #ff6f00;
      font-size: 16px;
      line-height: 1.2;
    }

    #box {
      height: 400px;
      width: 400px;
      margin: 20px auto;
      overflow-y: scroll;
      border: 2px solid orange;
      background-color: #fff3e0;
      padding: 10px;
    }

    button {
      padding: 10px 20px;
      font-size: 18px;
      background-color: orange;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    h1 {
      color: #d32f2f;
    }
  </style>
</head>
<body>

  <h1>🙏 Rama Koti (1 Crore) 🙏</h1>
  <h2 id="count">Count: 0</h2>

  <button onclick="startRama()">Start</button>

  <div id="box"></div>

  <script>
    const total = 10000000; // 1 crore
    let count = 0;
    const box = document.getElementById("box");
    const counter = document.getElementById("count");

    function startRama() {
      const batchSize = 1000; // Add 1000 at a time to prevent crash

      function addBatch() {
        for (let i = 0; i < batchSize && count < total; i++) {
          count++; // ✅ increment operator
          const div = document.createElement("div");
          div.className = "rama-text";
          div.innerText = "Sri Rama";
          box.appendChild(div);
        }

        counter.innerText = "Count: " + count.toLocaleString();

        if (count < total) {
          setTimeout(addBatch, 10); // Add next batch after 10ms
        } else {
          alert("🎉 Rama Koti Completed!");
        }
      }

      addBatch();
    }
  </script>

</body>
</html>
